name: Compile AR targets

on:
  workflow_dispatch:
    inputs:
      exhibition:
        description: 'Путь выставки (художник/название). Пусто = все выставки'
        required: false
        default: ''
  push:
    paths:
      - '*/*/config.json'
      - '*/*/assets/targets/*.jpg'

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install deps
        run: |
          npm install puppeteer
          pip install pillow

      - name: Find exhibitions to compile
        id: find
        run: |
          python3 - << 'PYEOF'
          import glob, os
          target = "${{ github.event.inputs.exhibition }}".strip()
          exhibitions = []
          if target:
              if os.path.exists(f"{target}/config.json"):
                  exhibitions = [target]
          else:
              for cfg in glob.glob("*/*/config.json"):
                  exhibitions.append(os.path.dirname(cfg))
          with open("/tmp/exhibitions.txt","w") as f:
              f.write("\n".join(exhibitions))
          print("Will compile:", exhibitions)
          PYEOF

      - name: Compile each exhibition
        run: |
          node << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const { execSync } = require('child_process');

          const exhibitions = fs.readFileSync('/tmp/exhibitions.txt','utf8').split('\n').filter(Boolean);

          async function compileOne(dir) {
            const config = JSON.parse(fs.readFileSync(dir + '/config.json','utf8'));
            const order = config.artworks.filter(a => a.target).map(a => a.id);
            if (!order.length) { console.log('No targets in', dir); return; }

            // Уменьшаем картинки в порядке конфига
            const sharp = require('child_process');
            fs.mkdirSync('/tmp/tg', { recursive: true });
            execSync('rm -f /tmp/tg/*.jpg');
            order.forEach((id, idx) => {
              const src = `${dir}/assets/targets/${id}.jpg`;
              if (!fs.existsSync(src)) { console.log('Missing', src); return; }
              const dst = `/tmp/tg/${String(idx).padStart(3,'0')}-${id}.jpg`;
              execSync(`python3 -c "from PIL import Image; im=Image.open('${src}'); im.thumbnail((1000,1000)); im.convert('RGB').save('${dst}','JPEG',quality=85)"`);
            });

            const browser = await puppeteer.launch({ headless:true, args:['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage'] });
            const page = await browser.newPage();
            const client = await page.target().createCDPSession();
            await client.send('Browser.setDownloadBehavior', { behavior:'allow', downloadPath:'/tmp/out' });
            fs.mkdirSync('/tmp/out', { recursive: true });
            try { fs.unlinkSync('/tmp/out/targets.mind'); } catch(e) {}
            page.on('console', m => { if(!m.text().match(/GL|GPU|WebGL/)) console.log(m.text()); });
            await page.goto('https://hiukim.github.io/mind-ar-js-doc/tools/compile', { waitUntil:'networkidle2' });
            const files = fs.readdirSync('/tmp/tg').sort().map(f => '/tmp/tg/'+f);
            console.log(dir, '->', files.length, 'targets');
            const input = await page.$('input[type="file"]');
            await input.uploadFile(...files);
            await new Promise(r=>setTimeout(r,3000));
            await page.evaluate(()=>{for(const b of document.querySelectorAll('button'))if(b.textContent.trim()==='Start'){b.click();return;}});
            await page.waitForFunction(()=>{for(const b of document.querySelectorAll('button'))if(b.textContent.includes('Download'))return true;return false;},{timeout:300000});
            await page.evaluate(()=>{for(const b of document.querySelectorAll('button'))if(b.textContent.includes('Download')){b.click();return;}});
            await new Promise(r=>setTimeout(r,6000));
            fs.copyFileSync('/tmp/out/targets.mind', dir + '/assets/targets/targets.mind');
            console.log('Saved', dir + '/assets/targets/targets.mind', fs.statSync(dir+'/assets/targets/targets.mind').size, 'bytes');
            await browser.close();
          }

          (async () => {
            for (const dir of exhibitions) {
              console.log('=== Compiling', dir, '===');
              await compileOne(dir);
            }
          })();
          JSEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Сохраняем сгенерированные файлы во временную папку
          mkdir -p /tmp/generated
          for f in */*/assets/targets/targets.mind; do
            [ -f "$f" ] || continue
            mkdir -p "/tmp/generated/$(dirname "$f")"
            cp "$f" "/tmp/generated/$f"
          done
          for i in 1 2 3 4 5; do
            git fetch origin main
            # Отбрасываем все локальные изменения (файлы уже сохранены в /tmp/generated)
            git reset --hard origin/main
            git clean -fd
            # Возвращаем свежесгенерированные файлы поверх актуального main
            CHANGED=0
            for f in $(cd /tmp/generated && find . -type f); do
              rel="${f#./}"
              mkdir -p "$(dirname "$rel")"
              cp "/tmp/generated/$rel" "$rel"
              git add "$rel"
              CHANGED=1
            done
            if [ "$CHANGED" = "0" ] || git diff --staged --quiet; then
              echo "Nothing to commit"; exit 0
            fi
            git commit -m "Auto-compile targets.mind [skip ci]"
            if git push origin main; then echo "Pushed on attempt $i"; exit 0; fi
            echo "Push failed, retry $i"; sleep $((i*5))
          done
          exit 1
