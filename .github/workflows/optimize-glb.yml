name: Optimize GLB models

on:
  push:
    paths:
      - '*/*/assets/models/raw/*.glb'

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install -g @gltf-transform/cli
      - name: Optimize
        run: |
          for raw in */*/assets/models/raw/*.glb; do
            [ -f "$raw" ] || continue
            out=$(echo "$raw" | sed 's|/raw/|/|')
            echo "Optimizing $raw -> $out"
            gltf-transform draco "$raw" "$out" || { echo "FAIL $raw"; continue; }
            echo "  $(du -sh $raw|cut -f1) -> $(du -sh $out|cut -f1)"
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Сохраняем сгенерированные файлы во временную папку
          mkdir -p /tmp/generated
          for f in */*/assets/models/*.glb; do
            [ -f "$f" ] || continue
            mkdir -p "/tmp/generated/$(dirname "$f")"
            cp "$f" "/tmp/generated/$f"
          done
          for i in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main
            # Возвращаем свежесгенерированные файлы поверх актуального main
            CHANGED=0
            for f in $(cd /tmp/generated && find . -type f); do
              rel="${f#./}"
              mkdir -p "$(dirname "$rel")"
              cp "/tmp/generated/$rel" "$rel"
              git add "$rel"
              CHANGED=1
            done
            if [ "$CHANGED" = "0" ] || git diff --staged --quiet; then
              echo "Nothing to commit"; exit 0
            fi
            git commit -m "Auto-optimize GLB [skip ci]"
            if git push origin main; then echo "Pushed on attempt $i"; exit 0; fi
            echo "Push failed, retry $i"; sleep $((i*5))
          done
          exit 1
