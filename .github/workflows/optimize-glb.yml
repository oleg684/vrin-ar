name: Optimize GLB models

on:
  push:
    paths:
      - 'assets/models/raw/*.glb'
  workflow_dispatch:

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install gltf-transform
        run: npm install -g @gltf-transform/cli
      - name: Optimize
        run: |
          mkdir -p assets/models
          for f in assets/models/raw/*.glb; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            out="assets/models/$name"
            echo "Optimizing $name..."
            gltf-transform draco "$f" "$out" || { echo "FAIL on $name"; continue; }
            echo "  $(du -sh $f | cut -f1) -> $(du -sh $out | cut -f1)"
          done
      - name: Commit with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/models/*.glb
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Auto-optimize GLB [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed, retry $i/5"
            sleep $((i * 5))
          done
          exit 1
