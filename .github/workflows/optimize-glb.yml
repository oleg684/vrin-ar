name: Optimize GLB models

on:
  push:
    paths:
      - '*/*/assets/models/raw/*.glb'

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @gltf-transform/cli
      - name: Optimize
        run: |
          for raw in */*/assets/models/raw/*.glb; do
            [ -f "$raw" ] || continue
            out=$(echo "$raw" | sed 's|/raw/|/|')
            echo "Optimizing $raw -> $out"
            gltf-transform draco "$raw" "$out" || { echo "FAIL $raw"; continue; }
            echo "  $(du -sh $raw|cut -f1) -> $(du -sh $out|cut -f1)"
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add */*/assets/models/*.glb
          if git diff --staged --quiet; then echo "Nothing"; exit 0; fi
          git commit -m "Auto-optimize GLB [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X ours origin/main || git rebase --abort
            if git push origin main; then echo "Pushed"; exit 0; fi
            sleep $((i*5))
          done
          exit 1
