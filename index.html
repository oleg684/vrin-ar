<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>VR IN — AR Выставка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #000; color: #fff; font-family: sans-serif; }

    #status {
      position: fixed; bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.6);
      border-radius: 999px;
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #status.found { background: rgba(0,150,0,0.7); }
  </style>
</head>
<body>

  <div id="status">Загрузка...</div>

  <script>
    const WEBHOOK = "https://webhook.site/a575bd48-e6c5-4c14-ae23-b1fcd71f458b";
    const SESSION = Date.now().toString(36) + Math.random().toString(36).substr(2, 4);

    function sendToServer(msg, type) {
      try {
        const data = JSON.stringify({ s: SESSION, t: new Date().toISOString(), type: type || "info", msg: msg });
        const blob = new Blob([data], { type: "text/plain" });
        if (navigator.sendBeacon) navigator.sendBeacon(WEBHOOK, blob);
        else fetch(WEBHOOK, { method: "POST", body: blob, mode: "no-cors", keepalive: true }).catch(()=>{});
      } catch(e) {}
    }

    function log(msg, type) {
      console.log(msg);
      sendToServer(msg, type);
    }

    function setStatus(text, found) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.classList.toggle("found", !!found);
    }

    window.addEventListener("error", (e) => {
      log("WIN ERR: " + e.message + " @ " + (e.filename||"?").split("/").pop() + ":" + e.lineno, "error");
      setStatus("Ошибка: " + e.message);
    });
    window.addEventListener("unhandledrejection", (e) => {
      const r = e.reason;
      log("REJECT: " + (r?.message || String(r)) + " | " + (r?.stack || "").substring(0, 250), "error");
      setStatus("Ошибка: " + (r?.message || "promise rejected"));
    });

    window.__log = log;
    window.__setStatus = setStatus;
    log("[boot] v1778445633 session=" + SESSION);
    log("[boot] ua=" + navigator.userAgent.substring(0, 100));
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <script src="config.js?v=1778445633"
    onload="window.__log('[load] config.js OK')"
    onerror="window.__log('[load] config.js FAILED', 'error')"></script>

  <script type="module" src="app.js?v=1778445633"></script>

</body>
</html>
