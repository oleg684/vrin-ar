<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR IN — AR Выставка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 100;
    }
    #loading p { margin-top: 1rem; font-size: 14px; opacity: 0.7; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint {
      position: fixed; bottom: 2rem; left: 0; right: 0;
      text-align: center; font-size: 14px;
      opacity: 0.7; z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Загрузка AR...</p>
  </div>

  <div id="hint">Наведите камеру на картину</div>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
