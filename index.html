<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR IN — AR Выставка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: monospace; }
    #debug {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 1rem; background: rgba(0,0,0,0.85);
      font-size: 11px; line-height: 1.4;
      z-index: 1000; max-height: 70vh; overflow-y: auto;
    }
    .log-info { color: #8f8; }
    .log-error { color: #f88; font-weight: bold; }
    .log-warn { color: #fc8; }
  </style>
</head>
<body>

  <div id="debug">
    <div class="log-info">[init] page loaded</div>
  </div>

  <script>
    const WEBHOOK = "https://webhook.site/a575bd48-e6c5-4c14-ae23-b1fcd71f458b";
    const SESSION = Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    const debugEl = document.getElementById("debug");

    function sendToServer(msg, type) {
      // Используем sendBeacon - он не делает CORS preflight
      // и не блокируется при unload
      try {
        const data = JSON.stringify({
          s: SESSION,
          t: new Date().toISOString(),
          type: type || "info",
          msg: msg
        });
        // Blob с text/plain не вызывает preflight
        const blob = new Blob([data], { type: "text/plain" });
        if (navigator.sendBeacon) {
          navigator.sendBeacon(WEBHOOK, blob);
        } else {
          fetch(WEBHOOK, { method: "POST", body: blob, mode: "no-cors", keepalive: true }).catch(()=>{});
        }
      } catch(e) {}
    }

    function log(msg, type) {
      const div = document.createElement("div");
      div.className = "log-" + (type || "info");
      const t = new Date().toISOString().substr(11,12);
      div.textContent = "[" + t + "] " + msg;
      debugEl.appendChild(div);
      console.log(msg);
      sendToServer(msg, type);
    }

    window.addEventListener("error", (e) => {
      log("WIN ERR: " + e.message + " @ " + (e.filename||"?").split("/").pop() + ":" + e.lineno, "error");
    });
    window.addEventListener("unhandledrejection", (e) => {
      const r = e.reason;
      log("REJECT: " + (r?.message || String(r)) + " | " + (r?.stack || "").substring(0, 250), "error");
    });

    window.__log = log;
    log("[boot] session=" + SESSION);
    log("[boot] ua=" + navigator.userAgent.substring(0, 100));
    log("[boot] mediaDevices=" + !!navigator.mediaDevices + " getUserMedia=" + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
    log("[boot] isSecureContext=" + window.isSecureContext);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    onload="window.__log('[load] mind-ar.js OK')"
    onerror="window.__log('[load] mind-ar.js FAILED', 'error')"></script>

  <script src="config.js"
    onload="window.__log('[load] config.js OK')"
    onerror="window.__log('[load] config.js FAILED', 'error')"></script>

  <script>
    window.__log("[check] MINDAR=" + (typeof window.MINDAR));
    if (window.MINDAR) {
      window.__log("[check] MINDAR.IMAGE=" + (typeof window.MINDAR.IMAGE));
      window.__log("[check] MINDAR.IMAGE.THREE=" + (window.MINDAR.IMAGE && typeof window.MINDAR.IMAGE.THREE));
    }
    window.__log("[check] window.THREE=" + (typeof window.THREE));
    window.__log("[check] EXHIBITION_CONFIG=" + (typeof EXHIBITION_CONFIG));
  </script>

  <script src="app.js"
    onload="window.__log('[load] app.js OK')"
    onerror="window.__log('[load] app.js FAILED', 'error')"></script>

</body>
</html>
