<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>The Monsters We Carry — AR</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none;}
    body{background:#000;color:#fff;font-family:sans-serif;}
    canvas{touch-action:none;display:block;}
    #status-bar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:0.4rem 1rem;background:rgba(0,0,0,0.55);border-radius:999px;font-size:13px;color:#fff;pointer-events:none;transition:opacity 0.5s;z-index:100;white-space:nowrap;}
  </style>
</head>
<body>
  <div id="status-bar">Загрузка...</div>
  <script>
    document.addEventListener("touchstart",e=>{if(!e.target.closest("#mute-btn"))e.preventDefault();},{passive:false});
    document.addEventListener("touchmove",e=>{e.preventDefault();},{passive:false});
  </script>
  <script type="importmap">
  {"imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }}
  </script>
  <script type="module" src="viewer.js"></script>
</body>
</html>
