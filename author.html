<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>VR IN — Режим автора</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      /* touch-action на body НЕ ставим — управляем точечно */
    }
    body { background: #000; color: #fff; font-family: sans-serif; }
    canvas { touch-action: none; display: block; }

    #status-bar {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      padding: 0.4rem 1rem; background: rgba(0,0,0,0.55); border-radius: 999px;
      font-size: 13px; color: #fff; pointer-events: none;
      transition: opacity 0.5s; z-index: 100; white-space: nowrap;
    }
    #author-badge {
      position: fixed; top: 1rem; left: 1rem;
      padding: 0.3rem 0.7rem; background: rgba(37,99,235,0.85);
      border-radius: 6px; font-size: 11px; color: #fff;
      pointer-events: none; z-index: 100;
    }

    /* Панель автора — разрешаем нативные touch */
    #author-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.88); padding: 1rem;
      border-top: 1px solid rgba(255,255,255,0.15);
      z-index: 100;
      touch-action: manipulation; /* разрешаем тапы и свайп внутри панели */
    }
    .hint { color: #aaa; font-size: 11px; margin-bottom: 0.7rem; }
    .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 0.8rem; }
    .slider-row label { color: #aaa; font-size: 11px; display: block; }
    .slider-row input[type=range] {
      width: 100%; margin-top: 2px;
      touch-action: manipulation; /* слайдер сам обрабатывает touch */
      cursor: pointer;
    }
    .slider-row span { color: #fff; font-size: 10px; }
    .actions { display: flex; gap: 0.5rem; }
    .btn-save {
      flex: 1; padding: 0.65rem; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
      touch-action: manipulation;
    }
    .btn-reset {
      padding: 0.65rem 1rem; background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      font-size: 14px; cursor: pointer; touch-action: manipulation;
    }
    #save-dialog {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); align-items: center; justify-content: center;
      z-index: 200; touch-action: manipulation;
    }
    .dialog-box {
      background: #1e1e1e; border-radius: 12px; padding: 1.5rem;
      width: 85%; max-width: 340px;
    }
    .dialog-box h3 { color: #fff; font-size: 15px; margin-bottom: 1rem; font-weight: 500; }
    .dialog-box p { color: #aaa; font-size: 12px; margin-bottom: 0.4rem; }
    .dialog-box input {
      width: 100%; padding: 0.6rem; border-radius: 6px;
      border: 1px solid #444; background: #2a2a2a;
      color: #fff; font-size: 13px; margin-bottom: 0.8rem;
      box-sizing: border-box; touch-action: manipulation;
    }
    .dialog-error { color: #f88; font-size: 12px; margin-bottom: 0.6rem; display: none; }
    .dialog-actions { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>

  <div id="status-bar">Загрузка...</div>
  <div id="author-badge">✏️ Режим автора</div>

  <div id="author-panel">
    <div class="hint">1 палец по камере = вращение · 2 пальца = двигать/масштаб</div>
    <div class="sliders">
      <div class="slider-row">
        <label>X (лево / право)</label>
        <input id="inp-x" type="range" min="-3" max="3" step="0.01">
        <span id="val-x"></span>
      </div>
      <div class="slider-row">
        <label>Y (вверх / вниз)</label>
        <input id="inp-y" type="range" min="-3" max="3" step="0.01">
        <span id="val-y"></span>
      </div>
      <div class="slider-row">
        <label>Z (вперёд / назад)</label>
        <input id="inp-z" type="range" min="-2" max="2" step="0.01">
        <span id="val-z"></span>
      </div>
      <div class="slider-row">
        <label>Масштаб</label>
        <input id="inp-scale" type="range" min="0.01" max="2" step="0.01">
        <span id="val-scale"></span>
      </div>
    </div>
    <div class="actions">
      <button class="btn-save" id="btn-save">💾 Сохранить в конфиг</button>
      <button class="btn-reset" id="btn-reset">↺ Сброс</button>
    </div>
  </div>

  <div id="save-dialog">
    <div class="dialog-box">
      <h3>Сохранить параметры</h3>
      <p>GitHub токен (repo scope):</p>
      <input id="inp-token" type="password" placeholder="ghp_...">
      <div class="dialog-error" id="save-error"></div>
      <div class="dialog-actions">
        <button class="btn-save" id="btn-confirm-save">Сохранить</button>
        <button class="btn-reset" id="btn-cancel-save">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    // Блокируем дефолтные touch только на canvas-области (не на панели)
    document.addEventListener("touchstart", e => {
      if (!e.target.closest("#author-panel, #save-dialog")) {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener("touchmove", e => {
      if (!e.target.closest("#author-panel, #save-dialog")) {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener("touchend", e => {
      if (!e.target.closest("#author-panel, #save-dialog")) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>

  <script>
    const WEBHOOK = "https://webhook.site/a575bd48-e6c5-4c14-ae23-b1fcd71f458b";
    const SESSION = Date.now().toString(36) + Math.random().toString(36).substr(2,4);
    function sendLog(msg, type) {
      try {
        const blob = new Blob([JSON.stringify({s:SESSION,t:new Date().toISOString(),type:type||"info",msg})],{type:"text/plain"});
        if (navigator.sendBeacon) navigator.sendBeacon(WEBHOOK, blob);
      } catch(e) {}
    }
    function log(msg, type) { console.log(msg); sendLog(msg, type); }
    function setStatus(text) {
      const el = document.getElementById("status-bar");
      if (el) { el.textContent = text; el.style.opacity = text ? "1" : "0"; }
    }
    window.addEventListener("error", e => log("ERR: "+e.message,"error"));
    window.addEventListener("unhandledrejection", e => log("REJECT: "+(e.reason?.message||e.reason),"error"));
    window.__log = log;
    window.__setStatus = setStatus;
    log("[boot] author v1778678046");
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <script src="config.js?v=1778678046"
    onload="window.__log('[load] config OK')"
    onerror="window.__log('[load] config FAIL','error')"></script>

  <script type="module" src="author.js?v=1778678046"></script>

</body>
</html>
